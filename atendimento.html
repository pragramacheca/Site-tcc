<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Atendimento de E-commerce - GamesBR</title>
  <link rel="stylesheet" href="estilo.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f9f9f9;
      color: #333;
    }

    h1 {
      color: #0055aa;
    }

    .relato {
      background-color: #ffffff;
      border-left: 6px solid #0055aa;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .relato strong {
      color: #222;
    }

    .sem-relatos {
      padding: 20px;
      background-color: #eee;
      border-radius: 8px;
      text-align: center;
      font-style: italic;
      color: #555;
    }

    a.voltar {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #0055aa;
      color: #ffffff;
      text-decoration: none;
      border-radius: 6px;
      transition: background-color 0.3s;
    }

    a.voltar:hover {
      background-color: #003d80;
    }
  </style>
</head>
<body>

  <h1>Painel de Atendimento de E-commerce</h1>
  <div id="relatos"></div>

  <a class="voltar" href="painel.html">← Voltar ao Painel</a>

  <script>
    const container = document.getElementById("relatos");
    const relatos = JSON.parse(localStorage.getItem("relatos")) || [];

    if (relatos.length === 0) {
      container.innerHTML = '<div class="sem-relatos">Nenhum relato enviado até o momento.</div>';
    } else {
      container.innerHTML = relatos.map((r) => `
        <div class="relato">
          <p><strong>Nome:</strong> ${r.nome}</p>
          <p><strong>Email:</strong> ${r.email}</p>
          <p><strong>Data:</strong> ${r.data}</p>
          <p><strong>Mensagem:</strong><br>${r.mensagem}</p>
        </div>
      `).join("");
    }
  </script>

</body>
</html>
