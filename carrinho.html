<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrinho - GamesBR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #ffda00;
    }

    .item {
      margin-bottom: 15px;
      padding: 10px;
      border-bottom: 1px solid #444;
    }

    .total {
      margin-top: 20px;
      font-size: 1.3em;
      font-weight: bold;
    }

    .finalizar-btn {
      margin-top: 20px;
      background-color: #28a745;
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
    }

    .finalizar-btn:hover {
      background-color: #218838;
    }

    a.voltar {
      display: inline-block;
      margin-top: 30px;
      color: #00bfff;
      text-decoration: none;
    }

    a.voltar:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>🛒 Seu Carrinho</h1>
  <div id="carrinho"></div>
  <p class="total" id="total"></p>
  <button class="finalizar-btn" onclick="finalizarCompra()">Finalizar Compra</button>
  <br />
  <a href="main.html" class="voltar">← Voltar para a loja</a>

  <script>
    const carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
    const container = document.getElementById("carrinho");
    let total = 0;

    if (carrinho.length === 0) {
      container.innerHTML = "<p>Seu carrinho está vazio.</p>";
      document.querySelector(".finalizar-btn").style.display = "none";
    } else {
      carrinho.forEach(item => {
        total += item.preco;
        const div = document.createElement("div");
        div.className = "item";
        div.textContent = `${item.nome} - R$ ${item.preco.toFixed(2)}`;
        container.appendChild(div);
      });
      document.getElementById("total").textContent = `Total: R$ ${total.toFixed(2)}`;
    }

    function finalizarCompra() {
      alert("Compra finalizada com sucesso!");
      localStorage.removeItem("carrinho");
      window.location.href = "main.html";
    }
  </script>
</body>
</html>
